<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bud-Invest — Chooser Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #222;
  --text: #e0e0e0;
  --muted: #888;
  --accent: #c9a84c;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,10,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
}
.header-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  flex-wrap: wrap;
}
.header h1 { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
.header h1 span { color: var(--accent); }

.tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; justify-content: center; }
.tab {
  padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
  color: var(--muted); white-space: nowrap;
}
.tab:hover { border-color: var(--accent); color: var(--text); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

.frame-container { margin-top: 75px; padding: 0; }
.frame-wrapper {
  background: var(--surface); overflow: hidden; width: 100%;
}
.frame-label {
  padding: 0.6rem 1.5rem;
  font-size: 0.85rem; font-weight: 600;
  background: rgba(20,20,20,0.95);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.frame-label .name { color: var(--accent); }
.frame-label .desc { color: var(--muted); font-weight: 400; font-size: 0.75rem; }
iframe { width: 100%; height: calc(100vh - 120px); border: none; background: #fff; }

@media (max-width: 768px) {
  .header-inner { flex-direction: column; align-items: stretch; }
  .tabs { overflow-x: auto; flex-wrap: nowrap; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Bud-Invest — <span>Chooser Variants</span></h1>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="frame-container" id="frames"></div>

<script>
const variants = [
  { id: 1, name: 'Obsidian Elegance', desc: 'Czarny, glass-morphism, złote akcenty', path: '/chooser-variants/v1-obsidian/index.html' },
  { id: 2, name: 'Cinematic Split', desc: 'Ciemna lewa / jasna prawa, diagonalny split', path: '/chooser-variants/v2-split-screen/index.html' },
  { id: 3, name: 'Industrial Brutalist', desc: 'Surowy beton, grube bloki, budowlana energia', path: '/chooser-variants/v3-brutalist/index.html' },
  { id: 4, name: 'White Precision', desc: 'Biały, ultra-minimal, Apple-style', path: '/chooser-variants/v4-white-minimal/index.html' },
  { id: 5, name: 'Neon & Steel', desc: 'Neonowe bordy, electric blue/orange glow', path: '/chooser-variants/v5-neon-steel/index.html' },
  { id: 6, name: 'Editorial Magazine', desc: 'Asymetryczny, serif, earth tones', path: '/chooser-variants/v6-editorial/index.html' },
];

let active = 0;

const tabsEl = document.getElementById('tabs');
variants.forEach((v, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = `${v.id}. ${v.name}`;
  tab.addEventListener('click', () => {
    active = i;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render();
  });
  tabsEl.appendChild(tab);
});

function render() {
  const container = document.getElementById('frames');
  const v = variants[active];
  container.innerHTML = `
    <div class="frame-wrapper">
      <div class="frame-label">
        <span class="name">${v.id}. ${v.name}</span>
        <span class="desc">${v.desc}</span>
      </div>
      <iframe src="${v.path}" loading="lazy"></iframe>
    </div>
  `;
}

render();
</script>
</body>
</html>
