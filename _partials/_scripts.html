<script>
document.addEventListener('DOMContentLoaded', () => {
    gsap.registerPlugin(ScrollTrigger);
    
    // Hamburger menu
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburgerBtn && mobileMenu) {
        hamburgerBtn.addEventListener('click', () => mobileMenu.classList.toggle('active'));
        mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('active')));
    }

    // Fade up
    gsap.utils.toArray('.gsap-fade-up').forEach(el => {
        gsap.fromTo(el, {y:40, opacity:0}, {y:0, opacity:1, duration:0.8, ease:'power2.out', scrollTrigger:{trigger:el, start:'top 85%'}});
    });

    // Stagger cards
    document.querySelectorAll('.services-grid, .job-grid, .equipment-grid').forEach(grid => {
        const cards = grid.querySelectorAll('.gsap-stagger, .service-card');
        if (cards.length) {
            ScrollTrigger.create({trigger: grid, start:'top 80%', animation: gsap.fromTo(cards, {y:50,opacity:0}, {y:0,opacity:1,stagger:0.1,duration:0.6,ease:'power2.out'})});
        }
    });

    // Stats stagger
    const statsBar = document.querySelector('.stats-bar');
    if (statsBar) {
        const stats = statsBar.querySelectorAll('.gsap-stagger-stat');
        if (stats.length) {
            ScrollTrigger.create({trigger: statsBar, start:'top 85%', animation: gsap.fromTo(stats, {y:30,opacity:0}, {y:0,opacity:1,stagger:0.15,duration:0.6,ease:'power2.out'})});
        }
    }
});
</script>

<script>
// Realizacje filter
(function() {
    const filterBtns = document.querySelectorAll('.filter-btn[data-filter]');
    const items = document.querySelectorAll('.filter-item');
    if (!filterBtns.length || !items.length) return;
    
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            items.forEach(item => {
                if (filter === 'all' || item.classList.contains(filter)) {
                    item.style.display = '';
                    gsap.fromTo(item, {opacity: 0, y: 20}, {opacity: 1, y: 0, duration: 0.4, ease: 'power2.out'});
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });
})();

// Nav scroll state
const navEl = document.querySelector('nav');
if (navEl) {
    window.addEventListener('scroll', () => {
        navEl.classList.toggle('scrolled', window.scrollY > 80);
    }, { passive: true });
}

// Hero video lazy load — desktop only, after page fully loaded
(function() {
    const vid = document.getElementById('heroVideo');
    if (!vid) return;
    if (window.innerWidth < 768) { vid.remove(); return; }
    
    window.addEventListener('load', () => {
        setTimeout(() => {
            vid.play().catch(() => {}); // autoplay may fail, poster stays
        }, 1000);
    });
})();

// Language Switcher — no JS needed, links have correct href from build
</script>

<!-- Contact Form Submit Handler -->
<script>
document.getElementById('contactForm')?.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('formStatus');
    const origText = btn.textContent;
    
    btn.textContent = 'Wysyłanie...';
    btn.disabled = true;
    
    try {
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());
        
        const response = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.success) {
            btn.textContent = '✓ Wysłano!';
            btn.style.background = '#22c55e';
            status.textContent = 'Dziękujemy! Odpowiemy w ciągu 48 godzin.';
            status.style.color = '#22c55e';
            this.reset();
            if (typeof turnstile !== 'undefined') turnstile.reset();
        } else {
            btn.textContent = '✗ Błąd — spróbuj ponownie';
            btn.style.background = '#ef4444';
            status.textContent = result.error || 'Coś poszło nie tak.';
            status.style.color = '#ef4444';
            btn.disabled = false;
            setTimeout(() => { btn.textContent = origText; btn.style.background = ''; status.textContent = 'Twoje dane są bezpieczne.'; status.style.color = 'var(--text-gray)'; }, 4000);
        }
    } catch (err) {
        btn.textContent = '✗ Błąd sieci';
        btn.style.background = '#ef4444';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = origText; btn.style.background = ''; }, 4000);
    }
});
</script>
