<script>
document.addEventListener('DOMContentLoaded', () => {
    gsap.registerPlugin(ScrollTrigger);
    
    // Hamburger menu
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburgerBtn && mobileMenu) {
        hamburgerBtn.addEventListener('click', () => mobileMenu.classList.toggle('active'));
        mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('active')));
    }

    // Fade up
    gsap.utils.toArray('.gsap-fade-up').forEach(el => {
        gsap.fromTo(el, {y:40, opacity:0}, {y:0, opacity:1, duration:0.8, ease:'power2.out', scrollTrigger:{trigger:el, start:'top 85%'}});
    });

    // Stagger cards
    document.querySelectorAll('.services-grid, .job-grid, .equipment-grid').forEach(grid => {
        const cards = grid.querySelectorAll('.gsap-stagger, .service-card');
        if (cards.length) {
            ScrollTrigger.create({trigger: grid, start:'top 80%', animation: gsap.fromTo(cards, {y:50,opacity:0}, {y:0,opacity:1,stagger:0.1,duration:0.6,ease:'power2.out'})});
        }
    });

    // Stats stagger
    const statsBar = document.querySelector('.stats-bar');
    if (statsBar) {
        const stats = statsBar.querySelectorAll('.gsap-stagger-stat');
        if (stats.length) {
            ScrollTrigger.create({trigger: statsBar, start:'top 85%', animation: gsap.fromTo(stats, {y:30,opacity:0}, {y:0,opacity:1,stagger:0.15,duration:0.6,ease:'power2.out'})});
        }
    }
});
</script>

<script>
// Realizacje filter
(function() {
    const filterBtns = document.querySelectorAll('.filter-btn[data-filter]');
    const items = document.querySelectorAll('.filter-item');
    if (!filterBtns.length || !items.length) return;
    
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            items.forEach(item => {
                if (filter === 'all' || item.classList.contains(filter)) {
                    item.style.display = '';
                    gsap.fromTo(item, {opacity: 0, y: 20}, {opacity: 1, y: 0, duration: 0.4, ease: 'power2.out'});
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });
})();

// Nav scroll state
const navEl = document.querySelector('nav');
if (navEl) {
    window.addEventListener('scroll', () => {
        navEl.classList.toggle('scrolled', window.scrollY > 80);
    }, { passive: true });
}

// Hero video lazy load — desktop only, after page fully loaded
(function() {
    const vid = document.getElementById('heroVideo');
    if (!vid) return;
    if (window.innerWidth < 768) { vid.remove(); return; }
    
    window.addEventListener('load', () => {
        setTimeout(() => {
            vid.play().catch(() => {}); // autoplay may fail, poster stays
        }, 1000);
    });
})();

// Language Switcher
(function() {
    const langFlags = document.querySelectorAll('.lang-flag');
    if (!langFlags.length) return;
    
    // URL mappings per language
    const urlMap = {
        '': { en: '/en/', de: '/de/' }, // homepage
        'o-nas': { en: '/en/about', de: '/de/ueber-uns' },
        'uslugi': { en: '/en/services', de: '/de/leistungen' },
        'uslugi/konstrukcje-stalowe': { en: '/en/services/steel-structures', de: '/de/leistungen/stahlkonstruktionen' },
        'uslugi/zbiorniki-cisnieniowe': { en: '/en/services/pressure-vessels', de: '/de/leistungen/druckbehaelter' },
        'uslugi/rurociagi-przemyslowe': { en: '/en/services/industrial-pipelines', de: '/de/leistungen/industrierohrleitungen' },
        'uslugi/obrobka-metali': { en: '/en/services/metal-processing', de: '/de/leistungen/metallbearbeitung' },
        'uslugi/prefabrykacja-betonu': { en: '/en/services/concrete-prefabrication', de: '/de/leistungen/betonfertigteile' },
        'realizacje': { en: '/en/projects', de: '/de/projekte' },
        'certyfikaty': { en: '/en/certifications', de: '/de/zertifikate' },
        'park-maszynowy': { en: '/en/machinery', de: '/de/maschinenpark' },
        'kariera': { en: '/en/careers', de: '/de/karriere' },
        'kontakt': { en: '/en/contact', de: '/de/kontakt' }
    };
    
    function getCurrentPageKey() {
        const path = window.location.pathname.replace(/^\/+|\/+$/g, '');
        return path;
    }
    
    langFlags.forEach(flag => {
        flag.addEventListener('click', () => {
            const targetLang = flag.dataset.lang;
            if (targetLang === 'pl') {
                // Go to Polish version - map current page back to PL
                const currentPath = window.location.pathname;
                if (currentPath.startsWith('/en/') || currentPath.startsWith('/de/')) {
                    // Find the corresponding PL page
                    const enPath = currentPath.replace(/^\/en\//, '');
                    const dePath = currentPath.replace(/^\/de\//, '');
                    
                    for (const [plKey, mapping] of Object.entries(urlMap)) {
                        if ((mapping.en && mapping.en.replace('/en/', '') === enPath) ||
                            (mapping.de && mapping.de.replace('/de/', '') === dePath)) {
                            window.location.href = plKey ? `/${plKey}` : '/';
                            return;
                        }
                    }
                }
                return;
            }
            
            const currentPageKey = getCurrentPageKey();
            const mapping = urlMap[currentPageKey];
            
            if (mapping && mapping[targetLang]) {
                window.location.href = mapping[targetLang];
            }
        });
    });
    
    // Set active language based on current path
    function setActiveLanguage() {
        const currentPath = window.location.pathname;
        langFlags.forEach(flag => flag.classList.remove('active'));
        
        if (currentPath.startsWith('/en/')) {
            document.querySelector('[data-lang="en"]')?.classList.add('active');
        } else if (currentPath.startsWith('/de/')) {
            document.querySelector('[data-lang="de"]')?.classList.add('active');
        } else {
            document.querySelector('[data-lang="pl"]')?.classList.add('active');
        }
    }
    
    setActiveLanguage();
})();
</script>
